name: RCS Fullstack CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Locate and Build Backend
        run: |
          # 自动寻找项目根目录下的 .slnx 或 .sln 文件
          SLN_FILE=$(find . -maxdepth 2 -name "*.slnx" -o -name "*.sln" | head -n 1)
          if [ -z "$SLN_FILE" ]; then
            echo "❌ 未找到解决方案文件 (.sln/.slnx)，请检查目录结构！"
            exit 1
          fi
          echo "✅ 发现解决方案文件: $SLN_FILE"
          dotnet build "$SLN_FILE" --configuration Release

  frontend-build:
    runs-on: ubuntu-latest
    # 🚀 极客配置：让这个 Job 里的所有 run 指令，默认都在 rcs-frontend 目录下执行！
    defaults:
      run:
        working-directory: ./RCS_React/rcs-frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 建议用较新的 LTS 版本

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build