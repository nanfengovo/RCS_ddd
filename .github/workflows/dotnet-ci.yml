name: RCS Fullstack CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    # 直接在根目录下进行 build，因为它能自动找到 RCS_API.slnx
    - name: Build Backend
      run: dotnet build RCS_API.slnx --configuration Release

  frontend-build:
    runs-on: ubuntu-latest
    # 【关键修正】这里去掉 defaults，直接在运行步骤里指定 cd 路径
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies and Build
      # 使用 shell 语法进入目录并执行
      run: |
        cd RCS_React
        npm ci
        npm run build